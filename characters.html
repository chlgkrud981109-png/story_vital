<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, onSnapshot, query, where, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  // [EMERGENCY FIX] Hardcoded firebase config for production
  const firebaseConfig = {
    apiKey: "AIzaSyBEkQmeFG8XGxNuYDZof_3_9oOS4cEMOyk",
    authDomain: "story-vital.firebaseapp.com",
    projectId: "story-vital",
    storageBucket: "story-vital.firebasestorage.app",
    messagingSenderId: "872952700994",
    appId: "1:872952700994:web:efa41cd38cd491fe5ccddb"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // Initialize global state immediately
  window.appChars = [];
  window.currentUser = null;

  onAuthStateChanged(auth, user => {
    if (user) {
      window.currentUser = user;
      const activeWorkId = localStorage.getItem('sv_activeWork');
      if (!activeWorkId) { location.href = 'index.html'; return; }
      
      const q = query(collection(db, 'characters'), where('projectId', '==', activeWorkId));
      onSnapshot(q, snap => {
        window.appChars = snap.docs.map(d => ({ id: d.id, ...d.data(), name: d.data().fullName })); 
        applyRender();
      });
    } else {
      location.href = 'index.html';
    }
  });

  window.saveCharDb = async (char) => {
    const activeWorkId = localStorage.getItem('sv_activeWork');
    if (!window.currentUser || !activeWorkId) return null;
    
    const charData = { 
      ...char, 
      fullName: char.name, 
      projectId: activeWorkId,
      updatedAt: new Date().toISOString()
    };
    delete charData.name;

    try {
      if (char.id && !char.id.startsWith('local')) {
        const id = char.id;
        delete charData.id;
        await updateDoc(doc(db, 'characters', id), charData);
        return id;
      } else {
        const docRef = await addDoc(collection(db, 'characters'), charData);
        return docRef.id;
      }
    } catch(e) { console.error(e); return null; }
  };

  window.deleteCharDb = async (id) => {
    if (!id || id.startsWith('local')) return;
    try { await deleteDoc(doc(db, 'characters', id)); } catch(e) { console.error(e); }
  };
</script>

<script>
  tailwind.config = {
    darkMode:'class',
    theme: { extend: { colors: { surface:'#09090d','surface-low':'#0e0e13','surface-mid':'#141419','surface-high':'#1a1a21','surface-bright':'#22222b',primary:'#b8a2ff','primary-dim':'#7c50ff',secondary:'#c490ff','secondary-dim':'#9d60f0',tertiary:'#ff9bbf','tertiary-dim':'#e8587a',success:'#40d0a8',outline:'#5e5b68','outline-variant':'#36333f','on-surface':'#eae6f4','on-surface-variant':'#9e9aaa' }, fontFamily:{ display:['Manrope','sans-serif'] } } }

<main class="ml-sidebar pt-16 min-h-screen">
  <div class="sticky top-16 z-[80]" style="background:rgba(9,9,13,0.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(184,162,255,0.06)">
    <div class="px-4 lg:px-8 py-4 flex flex-col sm:flex-row items-center gap-3">
      <div class="flex-1 text-white font-bold">캐릭터 데이터베이스 <span id="char-count-label" class="text-sm font-normal text-gray-400">· 0명</span></div>
      <div class="flex items-center gap-2">
        <input id="search-input" type="text" placeholder="검색..." class="inp w-48 sm:w-64" oninput="onSearch(this.value)"/>
        <button onclick="openFormDrawer(null)" class="bg-[#7c50ff] text-white px-4 py-2 rounded-xl text-sm font-bold glow">추가</button>
      </div>
    </div>
  </div>
  <div class="px-4 lg:px-8 py-5">
    <div id="char-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3"></div>
  </div>
</main>

<script>
let state = { filter:'all', search:'' };

window.applyRender = () => {
  let list = [...(window.appChars || [])];
  if (state.search) list = list.filter(c => c.name.toLowerCase().includes(state.search.toLowerCase()));
  
  document.getElementById('char-count-label').textContent = `· ${list.length}명`;
  const grid = document.getElementById('char-grid');
  grid.innerHTML = list.map(c => `
    <div class="char-card p-4" onclick="openDetail('${c.id}')">
      <div class="flex items-center gap-3 mb-2">
        <div class="text-white font-bold">${c.name}</div>
      </div>
      <div class="text-xs text-gray-400">${c.role}</div>
    </div>
  `).join('');
};

window.onSearch = (v) => { state.search = v; applyRender(); };

window.openDetail = (id) => alert('상세 정보 준비 중');
window.openFormDrawer = (id) => alert('입력 폼 준비 중');

window.addEventListener('load', () => {
  document.getElementById('nav-work-name').textContent = localStorage.getItem('sv_workName') || '-';
  document.getElementById('sidebar-work-name').textContent = localStorage.getItem('sv_workName') || '-';
});
</script>
