<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StoryVital — 작가를 위한 스마트 설정 관리</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, addDoc, getDocs, doc, query, where, onSnapshot, orderBy, limit } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  // [EMERGENCY FIX] Hardcoded firebase config for production
  const firebaseConfig = {
    apiKey: "AIzaSyBEkQmeFG8XGxNuYDZof_3_9oOS4cEMOyk",
    authDomain: "story-vital.firebaseapp.com",
    projectId: "story-vital",
    storageBucket: "story-vital.firebasestorage.app",
    messagingSenderId: "872952700994",
    appId: "1:872952700994:web:efa41cd38cd491fe5ccddb"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // Initialize global data object immediately to avoid reference errors
  window.appData = {
    works: [],
    activeWorkId: localStorage.getItem('sv_activeWork') || null,
    todayChars: parseInt(localStorage.getItem('sv_todayChars') || '0'),
    dailyGoal: 5000,
    user: null
  };

  // Auth Guard - Highest Priority
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.appData.user = user;
      const projectsRef = collection(db, 'projects');
      const q = query(projectsRef, where('userId', '==', user.uid));
      
      onSnapshot(q, (snapshot) => {
        const projects = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        window.appData.works = projects;
        
        if (projects.length === 0) {
          showOnboarding();
        } else {
          if (!window.appData.activeWorkId || !projects.find(p => p.id === window.appData.activeWorkId)) {
            window.appData.activeWorkId = projects[0].id;
            localStorage.setItem('sv_activeWork', projects[0].id);
          }
          showApp(user);
          renderDashboard();
        }
      });
    } else {
      showAuth();
    }
  });

  window.loginGoogle = async () => {
    try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch(e) { console.error(e); }
  };

  window.signOutUser = () => signOut(auth);

  window.saveWork = async (work) => {
    const uid = auth.currentUser?.uid;
    if (!uid) return null;
    try {
      const docRef = await addDoc(collection(db, 'projects'), { ...work, userId: uid });
      return docRef.id;
    } catch(e) { console.error(e); return null; }
  };

  // Expose methods for UI
  window.db = db;
  window.auth = auth;
</script>

<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          surface: '#09090d',
          'surface-low': '#0e0e13',
          'surface-mid': '#141419',
          'surface-high': '#1a1a21',
          'surface-bright': '#22222b',
          primary: '#b8a2ff',
          'primary-dim': '#7c50ff',
          secondary: '#c490ff',
          'secondary-dim': '#9d60f0',
          tertiary: '#ff9bbf',
          'tertiary-dim': '#e8587a',
          success: '#40d0a8',
          outline: '#5e5b68',
          'on-surface': '#eae6f4',
          'on-surface-variant': '#9e9aaa'
        },
        fontFamily: { display: ['Manrope', 'sans-serif'] }
      }
    }
  };
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.mat-icon { font-family: 'Material Symbols Outlined'; font-style: normal; user-select: none; line-height: 1; vertical-align: middle; }
body { background: #09090d; color: #eae6f4; font-family: 'Manrope', sans-serif; overflow-x: hidden; }

.sidebar-active { background: rgba(124,80,255,0.15); color: #b8a2ff; border-left: 2px solid #7c50ff; padding-left: 10px; }
.inp { background: rgba(0,0,0,0.6); border: 1px solid rgba(184,162,255,0.1); border-radius: 10px; padding: 10px 14px; color: #eae6f4; font-size: 14px; width: 100%; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
.inp:focus { border-color: #7c50ff; box-shadow: 0 0 0 3px rgba(124,80,255,0.15); }
.badge { padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
.badge-writing { background: rgba(64,208,168,0.15); color: #40d0a8; }
.badge-plan { background: rgba(184,162,255,0.15); color: #b8a2ff; }

.progress-track { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.06); overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: #7c50ff; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

.work-dropdown { position: absolute; top: 110%; right: 0; width: 220px; background: #1a1a21; border: 1px solid rgba(184,162,255,0.15); border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 150; visibility: hidden; opacity: 0; transform: translateY(-10px); transition: all 0.2s; }
.work-dropdown.open { visibility: visible; opacity: 1; transform: translateY(0); }
.work-option { padding: 10px 14px; cursor: pointer; transition: background 0.15s; border-radius: 8px; margin: 4px; }
.work-option:hover { background: rgba(255,255,255,0.04); }
.work-option.active { background: rgba(124,80,255,0.1); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.5s ease forwards; }

@media (min-width: 1024px) { .sidebar-desktop { display: flex; } .ml-sidebar { margin-left: 224px; } }
@media (max-width: 1023px) { .sidebar-desktop { display: none; } .ml-sidebar { margin-left: 0; } }
</style>
</head>

<body>

<!-- ═══════ AUTH SCREEN ═══════ -->
<div id="auth-screen" class="min-h-screen flex items-center justify-center p-6 hidden">
  <div class="glass-bright p-10 rounded-3xl w-full max-w-md text-center fade-up">
    <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6" style="background: linear-gradient(135deg, #7c50ff, #b8a2ff)">
      <span class="mat-icon text-white" style="font-size:32px">auto_stories</span>
    </div>

    <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-3 bg-white text-black py-3.5 rounded-xl font-bold transition-transform active:scale-95 mb-4">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/layout/google.svg" width="18" alt=""/>
      Google로 시작하기
    </button>

</div>

<!-- ═══════ ONBOARDING ═══════ -->

    <div class="flex justify-center gap-2 mb-8">
      <div id="sdot-1" class="w-2 h-2 rounded-full active" style="background:#5e5b68"></div>
      <div id="sdot-2" class="w-2 h-2 rounded-full" style="background:#5e5b68"></div>
      <div id="sdot-3" class="w-2 h-2 rounded-full" style="background:#5e5b68"></div>
    </div>

    <!-- Step 1: Welcome -->
    <div id="ob-step-1" class="glass-bright rounded-2xl p-8 text-center fade-in">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-5" style="background: linear-gradient(135deg, #7c50ff, #b8a2ff)">
        <span class="mat-icon text-white" style="font-size:28px">auto_stories</span>
      </div>
      <h2 class="text-2xl font-display font-extrabold text-white mb-3">환영합니다, 작가님!</h2>
      <button onclick="goObStep(2)" class="w-full py-3 rounded-xl font-semibold text-white text-sm glow-primary" style="background: #7c50ff"> 시작하기 → </button>
    </div>

    <!-- Step 2: Create first work -->
    <div id="ob-step-2" class="hidden glass-bright rounded-2xl p-8 fade-in">
      <h2 class="text-xl font-display font-extrabold text-white mb-1">첫 작품을 만들어볼까요?</h2>
      <div class="space-y-4">
        <div>
          <label class="text-xs uppercase tracking-wider block mb-2" style="color:#5e5b68">작품 제목 *</label>
          <input id="ob-title" type="text" placeholder="예: 마법사의 귀환 2부" class="inp"/>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs uppercase tracking-wider block mb-2" style="color:#5e5b68">장르</label>
            <select id="ob-genre" class="inp">
              <option value="현대판타지">현대 판타지</option>
              <option value="로맨스판타지">로맨스 판타지</option>
              <option value="판타지">정통 판타지</option>
              <option value="SF">SF</option>
              <option value="무협">무협</option>
              <option value="공포">공포/스릴러</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <div>
            <label class="text-xs uppercase tracking-wider block mb-2" style="color:#5e5b68">현재 상태</label>
            <select id="ob-status" class="inp">
              <option value="writing">집필 중</option>
              <option value="plan">기획 단계</option>
              <option value="hiatus">휴재 중</option>
            </select>
          </div>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="goObStep(1)" class="flex-1 py-3 rounded-xl text-sm" style="border:1px solid rgba(184,162,255,0.15);color:#9e9aaa">이전</button>
        <button onclick="finishOnboarding()" id="ob-finish-btn" class="flex-1 py-3 rounded-xl font-semibold text-white text-sm" style="background:#7c50ff">작품 만들기 →</button>
      </div>
    </div>

    <!-- Step 3: Done -->
    <div id="ob-step-3" class="hidden glass-bright rounded-2xl p-8 text-center fade-in">
      <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4" style="background: rgba(64,208,168,0.15); border: 2px solid #40d0a8">
        <span class="mat-icon" style="font-size:28px;color:#40d0a8">check</span>
      </div>
      <h2 class="text-xl font-display font-extrabold text-white mb-2">준비 완료!</h2>
      <button onclick="enterApp()" class="w-full py-3 rounded-xl font-semibold text-white text-sm glow-primary" style="background:#7c50ff"> 대시보드로 → </button>

</div>

<!-- ═══════ MAIN APP ═══════ -->
<div id="app-screen" class="hidden">

  <!-- TOP NAV -->
  <nav class="fixed top-0 left-0 right-0 z-[100] h-16 glass-bright flex items-center justify-between px-4 lg:px-6">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,#7c50ff,#b8a2ff)">
          <span class="mat-icon text-white" style="font-size:14px">auto_stories</span>
        </div>
        <span class="font-display font-extrabold text-white text-base hidden sm:block">StoryVital</span>
      </a>
      <div class="hidden lg:flex items-center gap-5 ml-4" style="font-size:14px">
        <a href="index.html" class="nav-active font-semibold">대시보드</a>
        <a href="characters.html" class="nav-link">캐릭터</a>
        <a href="chapters.html" class="nav-link">챕터 트래커</a>
        <a href="export.html" class="nav-link">내보내기</a>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <!-- Work switcher -->
      <div class="work-switcher" id="work-switcher">
        <button onclick="toggleWorkDropdown()" class="flex items-center gap-2 rounded-xl px-3 py-2 text-sm transition-all" style="background:rgba(255,255,255,0.04);border:1px solid rgba(184,162,255,0.12)">
          <span class="mat-icon text-sm" style="color:#b8a2ff;font-size:16px">book</span>
          <span id="active-work-name" class="font-semibold text-white max-w-[120px] truncate hidden sm:block">작품 선택</span>
          <span class="mat-icon text-sm" style="color:#9e9aaa;font-size:16px" id="switcher-arrow">expand_more</span>

        <div id="work-dropdown" class="work-dropdown">
          <div id="work-dropdown-list" class="py-1"></div>
          <div style="border-top:1px solid rgba(184,162,255,0.1)" class="p-2">
            <button onclick="openNewWorkModal()" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-xs transition-all" style="color:#9e9aaa">
              <span class="mat-icon text-base">add</span>새 작품 추가
            </button>
          </div>
        </div>
      </div>
      <img id="user-avatar" src="" alt="" class="w-8 h-8 rounded-full object-cover cursor-pointer" onclick="signOutUser()"/>
    </div>
  </nav>

  <!-- SIDEBAR -->
  <aside class="sidebar-desktop fixed left-0 top-16 bottom-0 w-56 flex-col py-5 z-50" style="background:#0e0e13;border-right:1px solid rgba(184,162,255,0.06)">
    <div class="px-4 mb-4">
      <p class="text-xs uppercase tracking-widest mb-1" style="color:#5e5b68">현재 작품</p>
      <p class="font-display font-bold text-white text-sm leading-snug" id="sidebar-work-name">-</p>

      <a href="index.html" class="sidebar-item sidebar-active"><span class="mat-icon text-lg">dashboard</span>대시보드</a>
      <a href="characters.html" class="sidebar-item"><span class="mat-icon text-lg">group</span>캐릭터 DB</a>
      <a href="chapters.html" class="sidebar-item"><span class="mat-icon text-lg">format_list_bulleted</span>챕터 트래커</a>
      <a href="export.html" class="sidebar-item"><span class="mat-icon text-lg">upload_file</span>내보내기</a>
    </nav>
    <div class="px-2">
      <button onclick="signOutUser()" class="sidebar-item w-full"><span class="mat-icon text-lg">logout</span>로그아웃</button>
    </div>

  <!-- MAIN CONTENT -->
  <main class="ml-sidebar pt-16 min-h-screen px-4 lg:px-8 py-7 pb-24" style="max-width:1200px;margin-right:auto">

    </section>
  </main>
</div>

<!-- ═══════ MODALS ═══════ -->
<div id="new-work-modal" class="hidden modal-bg" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="glass-bright rounded-2xl p-6 w-full max-w-md" onclick="event.stopPropagation()">
    <h2 class="text-lg font-display font-bold text-white mb-5">새 작품 추가</h2>
    <div class="space-y-4">
      <input id="nw-title" type="text" placeholder="작품 제목" class="inp"/>
      <select id="nw-genre" class="inp"><option>현대판타지</option><option>정통판타지</option></select>
    </div>
    <div class="flex gap-3 mt-5">
      <button onclick="createWork()" class="flex-1 py-3 rounded-xl text-sm font-semibold text-white" style="background:#7c50ff">생성</button>
    </div>
  </div>
</div>

<script>
// Logic handlers
function showAuth() { document.getElementById('auth-screen').classList.remove('hidden'); document.getElementById('app-screen').classList.add('hidden'); }
function showApp(user) {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('onboarding-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  const name = user.displayName?.split(' ')[0] || '작가님';
  document.getElementById('welcome-name').textContent = name;
  document.getElementById('user-avatar').src = user.photoURL || `https://api.dicebear.com/7.x/initials/svg?seed=${name}&backgroundColor=7c50ff`;
}
function showOnboarding() { document.getElementById('onboarding-screen').classList.remove('hidden'); document.getElementById('app-screen').classList.add('hidden'); }

window.goObStep = (n) => {
  [1,2,3].forEach(i => document.getElementById(`ob-step-${i}`)?.classList.add('hidden'));
  document.getElementById(`ob-step-${n}`)?.classList.remove('hidden');
};

window.finishOnboarding = async () => {
  const title = document.getElementById('ob-title').value.trim();
  if(!title) return;
  const work = { title, genre: document.getElementById('ob-genre').value, status: document.getElementById('ob-status').value, createdAt: new Date().toISOString() };
  const id = await window.saveWork(work);
  if(id) {
    window.appData.activeWorkId = id;
    localStorage.setItem('sv_activeWork', id);
    localStorage.setItem('sv_workName', title);
    goObStep(3);
  }
};

window.enterApp = () => showApp(window.appData.user);

function renderDashboard() {
  const active = window.appData.works.find(w => w.id === window.appData.activeWorkId) || window.appData.works[0];
  if(active) {
    window.appData.activeWorkId = active.id;
    localStorage.setItem('sv_activeWork', active.id);
    localStorage.setItem('sv_workName', active.title);
    document.getElementById('active-work-name').textContent = active.title;
    document.getElementById('sidebar-work-name').textContent = active.title;
  }
  
  const list = document.getElementById('work-dropdown-list');
  list.innerHTML = window.appData.works.map(w => `
    <div class="work-option" onclick="switchWork('${w.id}')">
      <div class="font-semibold text-sm text-white">${w.title}</div>
    </div>
  `).join('');

  const grid = document.getElementById('works-grid');
  grid.innerHTML = window.appData.works.map(w => `
    <div class="glass-bright p-5 rounded-2xl cursor-pointer" onclick="switchWork('${w.id}')">
      <h3 class="font-bold text-white truncate">${w.title}</h3>
    </div>
  `).join('');
}

window.switchWork = (id) => {
  window.appData.activeWorkId = id;
  localStorage.setItem('sv_activeWork', id);
  renderDashboard();
  document.getElementById('work-dropdown').classList.remove('open');
};

window.toggleWorkDropdown = () => document.getElementById('work-dropdown').classList.toggle('open');
window.openNewWorkModal = () => document.getElementById('new-work-modal').classList.remove('hidden');

window.createWork = async () => {
  const title = document.getElementById('nw-title').value.trim();
  const work = { title, genre: document.getElementById('nw-genre').value, createdAt: new Date().toISOString() };
  await window.saveWork(work);
  document.getElementById('new-work-modal').classList.add('hidden');
};
</script>
</body>
