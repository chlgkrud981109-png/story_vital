<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>챕터 트래커 — StoryVital</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, onSnapshot, query, where, limit } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBEkQmeFG8XGxNuYDZof_3_9oOS4cEMOyk",
    authDomain: " story-vital.firebaseapp.com",
    projectId: "story-vital",
    storageBucket: "story-vital.firebasestorage.app",
    messagingSenderId: "872952700994",
    appId: "1:872952700994:web:efa41cd38cd491fe5ccddb"
  };

  let db, auth;
  try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    auth = getAuth(app);
  } catch(e) {}

  window.addEventListener('load', () => {
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        window.currentUser = user;
        // 프로젝트 ID 가져오기
        const projectsRef = collection(db, 'projects');
        const pq = query(projectsRef, where("userId", "==", user.uid), limit(1));
        const pSnap = await getDocs(pq);
        if (!pSnap.empty) {
          window.currentProjectId = pSnap.docs[0].id;
          loadChapters(window.currentProjectId);
        } else {
          window.location.href = 'index.html';
        }
      } else {
        window.location.href = 'index.html';
      }
    });
  });

  async function loadChapters(projectId) {
    if (!projectId) return;
    try {
      // [DB 경로 수정] timeline_events 루트 컬렉션 사용
      const ref = collection(db, 'timeline_events');
      const q = query(ref, where("projectId", "==", projectId));
      
      onSnapshot(q, (snap) => {
        const events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        // 기존 Claude 코드의 appState에 맞춰 매핑
        window.appState.chapters = events.filter(e => e.type === 'chapter' || !e.type);
        window.appState.threads = events.filter(e => e.type === 'thread');
        window.renderAll();
      });
    } catch(e) { console.error(e); }
  }

  window.saveChapterToDb = async function(chapter) {
    const uid = window.currentUser?.uid;
    const projectId = window.currentProjectId;
    // [방어 코드 삽입]
    if (!uid || !projectId) return;

    try {
      const data = { ...chapter, userId: uid, projectId: projectId, type: 'chapter', updatedAt: new Date().toISOString() };
      if (chapter.id && !chapter.id.startsWith('ch-')) {
        await updateDoc(doc(db, 'timeline_events', chapter.id), data);
      } else {
        delete data.id;
        data.createdAt = new Date().toISOString();
        await addDoc(collection(db, 'timeline_events'), data);
      }
    } catch(e) { console.error(e); }
  };

  window.saveThreadToDb = async function(thread) {
    const uid = window.currentUser?.uid;
    const projectId = window.currentProjectId;
    if (!uid || !projectId) return;

    try {
      const data = { ...thread, userId: uid, projectId: projectId, type: 'thread', updatedAt: new Date().toISOString() };
      if (thread.id && !thread.id.startsWith('th-')) {
        await updateDoc(doc(db, 'timeline_events', thread.id), data);
      } else {
        delete data.id;
        data.createdAt = new Date().toISOString();
        await addDoc(collection(db, 'timeline_events'), data);
      }
    } catch(e) {}
  };
</script>

<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          surface: '#0a0a0e', 'surface-low': '#0f0f14', 'surface-mid': '#151519',

          tertiary: '#ff9bbf', 'tertiary-dim': '#e8587a',
          outline: '#6b6870', 'outline-variant': '#3e3c42',
          'on-surface': '#ede9f4', 'on-surface-variant': '#a8a5b0',
        },
        fontFamily: { display: ['Manrope', 'sans-serif'] }

    }

</script>

<style>

    <div class="hidden md:flex items-center gap-6 text-sm">

      <a href="characters.html" class="text-on-surface-variant hover:text-on-surface transition-colors">캐릭터</a>

  <div class="flex items-center gap-3">
    <button class="mat-icon text-outline hover:text-on-surface transition-colors">notifications</button>
    <img id="user-avatar" src="" alt="" class="w-8 h-8 rounded-full object-cover" style="border: 1px solid rgba(124,80,255,0.4)"/>

<div class="flex pt-16 min-h-screen">
  <aside class="sidebar fixed left-0 top-16 bottom-0 w-56 bg-surface-low flex flex-col py-6 z-40"
    style="border-right: 1px solid rgba(184,162,255,0.06)">
    <div class="px-4 mb-6">
      <p class="text-xs text-outline uppercase tracking-widest mb-1">현재 작품</p>
      <h2 class="font-display font-bold text-white text-sm">내 작품</h2>
      <p class="text-xs text-on-surface-variant mt-0.5">집필 중</p>
    </div>
    <nav class="flex-1 px-2 space-y-1 text-sm">
      <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-high hover:text-on-surface transition-all">
        <span class="mat-icon text-lg">dashboard</span><span>대시보드</span>
      </a>
      <a href="characters.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-high hover:text-on-surface transition-all">
        <span class="mat-icon text-lg">group</span><span>캐릭터 DB</span>
      </a>
      <a href="chapters.html" class="sidebar-active flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all">
        <span class="mat-icon text-lg">format_list_bulleted</span><span>챕터 트래커</span>
      </a>
      <a href="export.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-high hover:text-on-surface transition-all">
        <span class="mat-icon text-lg">upload_file</span><span>내보내기</span>
      </a>
    </nav>
  </aside>

  <main class="main-content flex-1 ml-56 flex flex-col" style="height: calc(100vh - 64px); overflow: hidden;">
    <div class="px-8 py-5 flex items-center justify-between flex-shrink-0" style="border-bottom: 1px solid rgba(184,162,255,0.07)">
      <div>
        <h1 class="text-xl font-display font-extrabold text-white flex items-center gap-2">
          <span class="mat-icon text-primary">format_list_bulleted</span>
          챕터 트래커
        </h1>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="openAddChapter()" class="flex items-center gap-2 bg-primary-dim text-white rounded-xl px-4 py-2 text-sm font-semibold hover:bg-primary-dim/80 transition-all">
          <span class="mat-icon text-base">add</span>회차 추가
        </button>
      </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
      <div class="w-72 flex-shrink-0 overflow-y-auto" style="border-right: 1px solid rgba(184,162,255,0.07)">
        <div id="chapter-list" class="py-2"></div>
      </div>
      <div class="flex-1 overflow-y-auto p-6">
        <div id="chapter-detail" class="mb-6">
          <div class="glass-bright rounded-xl p-5 mb-4">
            <h2 id="detail-title" class="font-display font-bold text-white text-lg">회차를 선택하세요</h2>
            <p id="detail-summary" class="text-sm text-on-surface-variant leading-relaxed mt-2"></p>
          </div>
          <div>
            <div class="flex items-center justify-between mb-3">
              <h3 class="text-sm font-semibold text-white">이 회차의 복선/사건</h3>
              <button onclick="openAddThread()" class="text-xs text-primary">추가</button>
            </div>
            <div id="chapter-threads" class="space-y-2"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- MODALS -->
<div id="chapter-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center modal-overlay" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="glass-bright rounded-2xl p-6 w-full max-w-lg mx-4" onclick="event.stopPropagation()">
    <h2 class="text-white text-lg font-bold mb-4">새 회차 추가</h2>
    <input id="new-chap-num" type="number" placeholder="회차 번호" class="input-recessed w-full rounded-xl px-4 py-2.5 mb-3"/>
    <input id="new-chap-title" type="text" placeholder="회차 제목" class="input-recessed w-full rounded-xl px-4 py-2.5 mb-3"/>
    <textarea id="new-chap-summary" placeholder="줄거리 요약" class="input-recessed w-full rounded-xl px-4 py-2.5 mb-4"></textarea>
    <button onclick="addChapter()" class="w-full bg-primary-dim text-white rounded-xl py-3 font-semibold">추가하기</button>
  </div>
</div>

<div id="thread-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center modal-overlay" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="glass-bright rounded-2xl p-6 w-full max-w-md mx-4" onclick="event.stopPropagation()">
    <h2 class="text-white text-lg font-bold mb-4">추가</h2>
    <input id="new-thread-title" type="text" placeholder="제목" class="input-recessed w-full rounded-xl px-4 py-2.5 mb-3"/>
    <textarea id="new-thread-desc" placeholder="설명" class="input-recessed w-full rounded-xl px-4 py-2.5 mb-4"></textarea>
    <button onclick="addThread()" class="w-full bg-primary-dim text-white rounded-xl py-3 font-semibold">추가하기</button>
  </div>
</div>

<script>
  window.appState = { chapters: [], threads: [], selectedChapterId: null };
  const STATUS_MAP = { draft: { label: '예정', cls: 'text-outline border-outline/30', bg: 'bg-outline/10' }, writing: { label: '집필 중', cls: 'text-primary border-primary/30', bg: 'bg-primary/10' }, done: { label: '완성', cls: 'text-secondary border-secondary/30', bg: 'bg-secondary/10' }, published: { label: '연재됨', cls: 'text-green-400 border-green-400/30', bg: 'bg-green-400/10' } };

  window.renderAll = function() {
    renderChapterList();
    renderChapterDetail();
  };

  function renderChapterList() {
    const list = document.getElementById('chapter-list');
    list.innerHTML = appState.chapters.map(ch => `
      <div onclick="selectChapter('${ch.id}')" class="chapter-item px-4 py-3 cursor-pointer ${ch.id === appState.selectedChapterId ? 'chapter-active' : ''} rounded-lg mx-2 mb-1">
        <span class="text-xs font-bold text-on-surface-variant">${ch.num}화</span>
        <p class="text-sm font-semibold text-white truncate">${ch.title}</p>
      </div>`).join('');
  }

  function renderChapterDetail() {
    const ch = appState.chapters.find(c => c.id === appState.selectedChapterId);
    if (!ch) return;
    document.getElementById('detail-title').textContent = `${ch.num}화 · ${ch.title}`;
    document.getElementById('detail-summary').textContent = ch.summary || '';
    const threads = appState.threads.filter(t => t.chapterId === ch.id);
    document.getElementById('chapter-threads').innerHTML = threads.map(t => `
      <div class="glass rounded-xl p-3">
        <p class="text-sm font-semibold text-white">${t.title}</p>
        <p class="text-xs text-on-surface-variant">${t.desc || ''}</p>
      </div>`).join('');
  }

  window.selectChapter = id => { appState.selectedChapterId = id; renderAll(); };
  window.openAddChapter = () => document.getElementById('chapter-modal').classList.remove('hidden');
  window.openAddThread = () => document.getElementById('thread-modal').classList.remove('hidden');

  window.addChapter = () => {
    const ch = { id: 'ch-' + Date.now(), num: document.getElementById('new-chap-num').value, title: document.getElementById('new-chap-title').value, summary: document.getElementById('new-chap-summary').value };
    saveChapterToDb(ch);
    document.getElementById('chapter-modal').classList.add('hidden');
  };

  window.addThread = () => {
    const th = { id: 'th-' + Date.now(), title: document.getElementById('new-thread-title').value, desc: document.getElementById('new-thread-desc').value, chapterId: appState.selectedChapterId };
    saveThreadToDb(th);
    document.getElementById('thread-modal').classList.add('hidden');
  };
</script>
</body>
</html>
